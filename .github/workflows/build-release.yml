name: Build Debian package

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create or update a GitHub release
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag used when publishing
        required: true
        type: string
        default: v1.0.0

permissions:
  contents: write

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build package
        run: ./build.sh

      - name: Validate package and create checksum
        id: package
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          packages=(dist/*.deb)
          if (( ${#packages[@]} != 1 )); then
            echo "Expected exactly one Debian package, found ${#packages[@]}" >&2
            exit 1
          fi

          asset="${packages[0]}"
          package_name="$(dpkg-deb --field "$asset" Package)"
          package_version="$(dpkg-deb --field "$asset" Version)"

          dpkg-deb --info "$asset"
          dpkg-deb --contents "$asset"
          dpkg-deb --fsys-tarfile "$asset" |
            tar -xOf - ./etc/modprobe.d/dell-precision-7780-audio.conf |
            grep -Fx 'options snd_intel_dspcfg dsp_driver=3'

          sha256sum "$asset" > "$asset.sha256"

          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "checksum=$asset.sha256" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.package_name }}_${{ steps.package.outputs.package_version }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

      - name: Create or update release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ASSET: ${{ steps.package.outputs.asset }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_TAG" ]]; then
            echo "release_tag cannot be empty" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ASSET" "$CHECKSUM" --clobber
          else
            gh release create "$RELEASE_TAG" "$ASSET" "$CHECKSUM" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
